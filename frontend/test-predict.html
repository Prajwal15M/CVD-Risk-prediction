<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CVD Prediction Test</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
    .form-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; font-weight: bold; }
    input { width: 100%; padding: 8px; box-sizing: border-box; }
    button { background: #7c3aed; color: white; padding: 12px 24px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
    button:hover { background: #6d28d9; }
    #result { margin-top: 30px; padding: 20px; background: #f3f4f6; border-radius: 8px; display: none; }
    .risk-high { color: #ef4444; }
    .risk-medium { color: #f59e0b; }
    .risk-low { color: #10b981; }
  </style>
</head>
<body>
  <h1>CVD Risk Prediction</h1>
  
  <form id="predictionForm">
    <div class="form-group">
      <label>Retinal Fundus Image:</label>
      <input type="file" id="image" accept="image/*" required>
    </div>

    <h3>Patient Biometrics</h3>
    <div class="form-group">
      <label>Gender (1=Male, 0=Female):</label>
      <input type="number" id="male" value="1" required>
    </div>
    <div class="form-group">
      <label>Age:</label>
      <input type="number" id="age" value="55" required>
    </div>
    <div class="form-group">
      <label>Education Level:</label>
      <input type="number" id="education" value="2" required>
    </div>
    <div class="form-group">
      <label>Current Smoker (1=Yes, 0=No):</label>
      <input type="number" id="currentSmoker" value="0" required>
    </div>
    <div class="form-group">
      <label>Cigarettes Per Day:</label>
      <input type="number" id="cigsPerDay" value="0" required>
    </div>
    <div class="form-group">
      <label>BP Meds (1=Yes, 0=No):</label>
      <input type="number" id="BPMeds" value="0" required>
    </div>
    <div class="form-group">
      <label>Prevalent Stroke (1=Yes, 0=No):</label>
      <input type="number" id="prevalentStroke" value="0" required>
    </div>
    <div class="form-group">
      <label>Prevalent Hypertension (1=Yes, 0=No):</label>
      <input type="number" id="prevalentHyp" value="0" required>
    </div>
    <div class="form-group">
      <label>Diabetes (1=Yes, 0=No):</label>
      <input type="number" id="diabetes" value="0" required>
    </div>
    <div class="form-group">
      <label>Total Cholesterol:</label>
      <input type="number" id="totChol" value="200" required>
    </div>
    <div class="form-group">
      <label>Systolic BP:</label>
      <input type="number" id="sysBP" value="120" required>
    </div>
    <div class="form-group">
      <label>Diastolic BP:</label>
      <input type="number" id="diaBP" value="80" required>
    </div>
    <div class="form-group">
      <label>BMI:</label>
      <input type="number" step="0.1" id="BMI" value="25.5" required>
    </div>
    <div class="form-group">
      <label>Heart Rate:</label>
      <input type="number" id="heartRate" value="72" required>
    </div>
    <div class="form-group">
      <label>Glucose:</label>
      <input type="number" id="glucose" value="90" required>
    </div>

    <button type="submit">Predict CVD Risk</button>
  </form>

  <div id="result">
    <h2>Prediction Results</h2>
    <div id="resultContent"></div>
  </div>

  <script type="module">
    import { predictCVD } from './src/api.js';

    document.getElementById('predictionForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const imageFile = document.getElementById('image').files[0];
      const patientData = {
        male: parseFloat(document.getElementById('male').value),
        age: parseFloat(document.getElementById('age').value),
        education: parseFloat(document.getElementById('education').value),
        currentSmoker: parseFloat(document.getElementById('currentSmoker').value),
        cigsPerDay: parseFloat(document.getElementById('cigsPerDay').value),
        BPMeds: parseFloat(document.getElementById('BPMeds').value),
        prevalentStroke: parseFloat(document.getElementById('prevalentStroke').value),
        prevalentHyp: parseFloat(document.getElementById('prevalentHyp').value),
        diabetes: parseFloat(document.getElementById('diabetes').value),
        totChol: parseFloat(document.getElementById('totChol').value),
        sysBP: parseFloat(document.getElementById('sysBP').value),
        diaBP: parseFloat(document.getElementById('diaBP').value),
        BMI: parseFloat(document.getElementById('BMI').value),
        heartRate: parseFloat(document.getElementById('heartRate').value),
        glucose: parseFloat(document.getElementById('glucose').value),
        pulse_pressure: parseFloat(document.getElementById('sysBP').value) - parseFloat(document.getElementById('diaBP').value),
        smoker_intensity: parseFloat(document.getElementById('currentSmoker').value) * parseFloat(document.getElementById('cigsPerDay').value),
        chol_age_ratio: parseFloat(document.getElementById('totChol').value) / parseFloat(document.getElementById('age').value),
        hyp_diabetes: parseFloat(document.getElementById('prevalentHyp').value) * parseFloat(document.getElementById('diabetes').value)
      };

      try {
        const result = await predictCVD(imageFile, patientData);
        displayResult(result);
      } catch (error) {
        alert('Error: ' + error.message);
      }
    });

    function displayResult(result) {
      const resultDiv = document.getElementById('result');
      const contentDiv = document.getElementById('resultContent');
      
      const riskClass = `risk-${result.combined.risk.toLowerCase()}`;
      
      contentDiv.innerHTML = `
        <h3 class="${riskClass}">Combined Risk: ${result.combined.risk} (${result.combined.confidence}%)</h3>
        
        <h4>Image Model Analysis:</h4>
        <p><strong>Risk Level:</strong> ${result.image_model.risk}</p>
        <p><strong>Confidence:</strong> ${result.image_model.confidence}%</p>
        <p><strong>Probabilities:</strong></p>
        <ul>
          ${Object.entries(result.image_model.probabilities).map(([key, val]) => 
            `<li>${key}: ${val}%</li>`
          ).join('')}
        </ul>

        <h4>Tabular Model Analysis:</h4>
        <p><strong>Risk Level:</strong> ${result.tabular_model.risk}</p>
        <p><strong>Confidence:</strong> ${result.tabular_model.confidence}%</p>
      `;
      
      resultDiv.style.display = 'block';
    }
  </script>
</body>
</html>
